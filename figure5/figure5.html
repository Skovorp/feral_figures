<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Figure 5 — multi-species</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 790px;
      height: 660px;
      background: white;
      font-family: Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .panel {
      position: absolute;
      /* outline: 1px dashed rgba(255,0,0,.25); */
    }
    .panel img { display: block; width: 100%; height: 100%; }

    /* Panel-letter overlays — inside-panel positioning so they can't be
       clipped by the body's overflow:hidden when a panel sits at (0,0). */
    .letter {
      position: absolute;
      top: 0;
      left: 2px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 16px;
      color: #000;
      z-index: 10;
      line-height: 1;
    }

    /* Inline arrow SVG covers the whole body; pointer-events:none so it
       doesn't intercept anything. Edit the path d="…" to adjust curves. */
    #arrows {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* --- Layout grid ----------------------------------------------------
       Row 1 (y=  0..280):  a [  0..170]   b [180..790]
       Row 2 (y=280..440):  c band: left-thumb | matrix | right-thumb
       Row 3 (y=440..660):  d [  0..490]    e [490..790]
       -------------------------------------------------------------------- */
    #a { left:   0px; top:   0px; width: 170px; height: 360px; }
    #b { left: 180px; top:   8px; width: 600px; height: 270px; }

    #c-left   { left:  10px; top: 295px; width: 130px; height: 130px; }
    #c-matrix { left: 245px; top: 275px; width: 240px; height: 240px; }
    #c-right  { left: 640px; top: 295px; width: 130px; height: 130px; }

    #d { left:   0px; top: 430px; width: 490px; height: 230px; }
    #e { left: 510px; top: 430px; width: 260px; height: 220px; }

    /* Overflow-report div — read by build.py */
    #overflow-report { display: none; }
  </style>
</head>
<body>
  <div class="panel" id="a"><div class="letter">a</div><img src="panels/a.svg" alt="a"></div>
  <div class="panel" id="b"><div class="letter">b</div><img src="panels/b.svg" alt="b"></div>

  <!-- Panel C: thumbnails + matrix + arrows ----------------------------- -->
  <div class="panel" id="c-left"><img src="assets/petri_c_left.png" alt="c-left"></div>
  <div class="panel" id="c-matrix">
    <div class="letter">c</div>
    <img src="panels/c_matrix.svg" alt="c-matrix">
  </div>
  <div class="panel" id="c-right"><img src="assets/petri_c_right.png" alt="c-right"></div>

  <!-- Curved arrows between matrix off-diagonal cells and thumbnails.
       Coordinates are in body CSS pixels (0..790 x, 0..660 y).
       To re-route an arrow: edit the path's d="M sx sy Q cx cy ex ey".
       Marker = small filled triangle. -->
  <svg id="arrows" viewBox="0 0 790 660" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5"
              markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#9A9A9A"/>
      </marker>
    </defs>

    <!-- 294 cell (bottom-left off-diagonal, GT no-raiding × pred raiding)
         curves DOWN-LEFT to the LEFT thumbnail.
         Matrix bottom-left cell center: x≈340, y≈420
         Left thumb right edge mid:      x≈140, y≈360 -->
    <path d="M 305 410 Q 215 460 145 365"
          stroke="#9A9A9A" stroke-width="1.2" fill="none"
          marker-end="url(#arrowhead)"/>

    <!-- 376 cell (top-right off-diagonal, GT raiding × pred no-raiding)
         curves UP-RIGHT to the RIGHT thumbnail.
         Matrix top-right cell center: x≈430, y≈345
         Right thumb left edge mid:    x≈640, y≈360 -->
    <path d="M 470 345 Q 560 285 640 360"
          stroke="#9A9A9A" stroke-width="1.2" fill="none"
          marker-end="url(#arrowhead)"/>
  </svg>

  <div class="panel" id="d"><div class="letter">d</div><img src="panels/d.svg" alt="d"></div>
  <div class="panel" id="e"><div class="letter">e</div><img src="panels/e.svg" alt="e"></div>

  <div id="overflow-report"></div>
  <script>
    (function checkOverflow() {
      const body = document.body;
      const bw = body.clientWidth;
      const bh = body.clientHeight;
      const issues = [];
      if (body.scrollWidth  > bw) issues.push(`body overflow horizontally: ${body.scrollWidth - bw}px`);
      if (body.scrollHeight > bh) issues.push(`body overflow vertically: ${body.scrollHeight - bh}px`);
      document.querySelectorAll('.panel').forEach(p => {
        const r = p.getBoundingClientRect();
        if (r.right  > bw + 0.5) issues.push(`#${p.id}: right edge overflows by ${(r.right  - bw ).toFixed(1)}px`);
        if (r.bottom > bh + 0.5) issues.push(`#${p.id}: bottom edge overflows by ${(r.bottom - bh).toFixed(1)}px`);
        if (r.left   < -0.5)     issues.push(`#${p.id}: left edge negative by ${(-r.left).toFixed(1)}px`);
        if (r.top    < -0.5)     issues.push(`#${p.id}: top edge negative by ${(-r.top).toFixed(1)}px`);
      });
      const rep = document.getElementById('overflow-report');
      rep.textContent = issues.length ? 'OVERFLOW_FOUND ' + issues.join(' | ') : 'OVERFLOW_OK';
      rep.style.display = 'block';
      rep.style.position = 'fixed';
      rep.style.left = '-9999px';
    })();
  </script>
</body>
</html>
