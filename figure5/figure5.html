<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Figure 5 — multi-species</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 790px;
      height: 660px;
      background: white;
      font-family: Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .panel { position: absolute; }
    .panel img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    /* Panel letters (drawn in HTML so they can't be clipped by SVG bbox). */
    .letter {
      position: absolute;
      top: 0;
      left: 2px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 16px;
      color: #000;
      z-index: 10;
      line-height: 1;
    }

    /* --- Panel A (entirely HTML, no SVG) ------------------------------- */
    #a-letter { position: absolute; top: 0; left: 2px;
                font: bold 16px Arial; z-index: 10; line-height: 1; }
    .dot-header {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: Arial, sans-serif;
      font-size: 11px;
      z-index: 6;
    }
    .dot-header .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    /* Rounded gray box around each petri-pair photo. The image fills the
       inside via object-fit:contain. */
    .petri-box {
      position: absolute;
      border: 1px solid #A8A8A8;
      border-radius: 8px;
      padding: 4px;
      box-sizing: border-box;
      background: white;
    }
    .petri-box img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Arrows SVG covers full body; pointer-events:none. */
    #arrows {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* --- Layout grid ----------------------------------------------------
       Panel A (HTML only):    [0..170, 0..240]
       Row 1 (y=0..280):       b [180..790]
       Row 2 (y=280..440):     c band — left thumb | matrix | right thumb
       Row 3 (y=440..660):     d [0..490]    e [510..770]
       -------------------------------------------------------------------- */

    /* Panel A pieces */
    #a-letter        { top:   0px; left:   2px; }
    #a-h1            { top:   2px; left:  45px; }
    #a-box1          { top:  22px; left:  10px; width: 160px; height:  92px; }
    #a-h2            { top: 122px; left:  60px; }
    #a-box2          { top: 142px; left:  10px; width: 160px; height:  92px; }

    #b { left: 180px; top:   8px; width: 600px; height: 270px; }

    #c-left   { left:  10px; top: 295px; width: 130px; height: 130px; }
    #c-matrix { left: 245px; top: 275px; width: 240px; height: 240px; }
    #c-right  { left: 640px; top: 295px; width: 130px; height: 130px; }

    #d { left:   0px; top: 430px; width: 490px; height: 230px; }
    #e { left: 510px; top: 430px; width: 260px; height: 220px; }

    #overflow-report { display: none; }
  </style>
</head>
<body>
  <!-- Panel A — composed entirely in HTML (no matplotlib SVG). -->
  <div id="a-letter">a</div>
  <div id="a-h1" class="dot-header">
    <span class="dot" style="background:#5A5A5A"></span>no raiding
  </div>
  <div id="a-box1" class="petri-box">
    <img src="assets/petri_no_raiding.png" alt="no raiding pair">
  </div>
  <div id="a-h2" class="dot-header">
    <span class="dot" style="background:#F0996E"></span>raiding
  </div>
  <div id="a-box2" class="petri-box">
    <img src="assets/petri_raiding.png" alt="raiding pair">
  </div>

  <div class="panel" id="b"><div class="letter">b</div><img src="panels/b.svg" alt="b"></div>

  <!-- Panel C: thumbnails + matrix + arrows ----------------------------- -->
  <div class="panel" id="c-left"><img src="assets/petri_c_left.png" alt="c-left"></div>
  <div class="panel" id="c-matrix">
    <div class="letter">c</div>
    <img src="panels/c_matrix.svg" alt="c-matrix">
  </div>
  <div class="panel" id="c-right"><img src="assets/petri_c_right.png" alt="c-right"></div>

  <svg id="arrows" viewBox="0 0 790 660" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5"
              markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#9A9A9A"/>
      </marker>
    </defs>
    <path d="M 305 410 Q 215 460 145 365"
          stroke="#9A9A9A" stroke-width="1.2" fill="none"
          marker-end="url(#arrowhead)"/>
    <path d="M 470 345 Q 560 285 640 360"
          stroke="#9A9A9A" stroke-width="1.2" fill="none"
          marker-end="url(#arrowhead)"/>
  </svg>

  <div class="panel" id="d"><div class="letter">d</div><img src="panels/d.svg" alt="d"></div>
  <div class="panel" id="e"><div class="letter">e</div><img src="panels/e.svg" alt="e"></div>

  <div id="overflow-report"></div>
  <script>
    (function checkOverflow() {
      const body = document.body;
      const bw = body.clientWidth;
      const bh = body.clientHeight;
      const issues = [];
      if (body.scrollWidth  > bw) issues.push(`body overflow horizontally: ${body.scrollWidth - bw}px`);
      if (body.scrollHeight > bh) issues.push(`body overflow vertically: ${body.scrollHeight - bh}px`);
      document.querySelectorAll('.panel, .petri-box, .dot-header').forEach(p => {
        const r = p.getBoundingClientRect();
        const id = p.id || p.className;
        if (r.right  > bw + 0.5) issues.push(`#${id}: right edge overflows by ${(r.right  - bw ).toFixed(1)}px`);
        if (r.bottom > bh + 0.5) issues.push(`#${id}: bottom edge overflows by ${(r.bottom - bh).toFixed(1)}px`);
        if (r.left   < -0.5)     issues.push(`#${id}: left edge negative by ${(-r.left).toFixed(1)}px`);
        if (r.top    < -0.5)     issues.push(`#${id}: top edge negative by ${(-r.top).toFixed(1)}px`);
      });
      const rep = document.getElementById('overflow-report');
      rep.textContent = issues.length ? 'OVERFLOW_FOUND ' + issues.join(' | ') : 'OVERFLOW_OK';
      rep.style.display = 'block';
      rep.style.position = 'fixed';
      rep.style.left = '-9999px';
    })();
  </script>
</body>
</html>
