<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Figure 2 — CalMS21 mice</title>
  <style>
    /* The page is the figure canvas. 1 CSS px = 1 device px at scale 1.
       build.py rescales the final raster with --force-device-scale-factor.
       To move a panel: edit the #x rules below. */
    html, body { margin: 0; padding: 0; }
    body {
      width: 780px;
      height: 820px;
      background: white;
      font-family: Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      /* outline: 1px dashed rgba(255,0,0,.25); */ /* turn on for debug */
    }
    .panel img { display: block; width: 100%; height: 100%; }

    /* Panel letter overlays — drawn on top of each panel SVG so they can't
       be clipped at SVG edges. Edit `.letter`'s font-size to resize. */
    .letter {
      position: absolute;
      top: -2px;
      left: -2px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 16px;
      color: #000;
      z-index: 10;
      line-height: 1;
    }

    /* --- Layout grid ---------------------------------------------------
       Row 1 (y=0..300):    a [0..225]    b [225..780]
       Row 2 (y=310..580):  c [0..200]    d [200..490]   e [490..780]
       Row 3 (y=585..820):  f [0..255]    g [255..555]   h [580..780]
       ------------------------------------------------------------------- */
    #a { left:   0px; top:   0px; width: 225px; height: 300px; }
    #b { left: 225px; top:   0px; width: 555px; height: 260px; }

    #c { left:   0px; top: 310px; width: 200px; height: 260px; }
    #d { left: 200px; top: 310px; width: 290px; height: 260px; }
    #e { left: 490px; top: 295px; width: 290px; height: 280px; }

    #f { left:   0px; top: 585px; width: 255px; height: 235px; }
    #g { left: 255px; top: 585px; width: 300px; height: 235px; }
    #h { left: 580px; top: 585px; width: 200px; height: 235px; }
  </style>
</head>
<body>
  <div class="panel" id="a"><div class="letter">a</div><img src="panels/a.svg" alt="panel a"></div>
  <div class="panel" id="b"><div class="letter">b</div><img src="panels/b.svg" alt="panel b"></div>
  <div class="panel" id="c"><div class="letter">c</div><img src="panels/c.svg" alt="panel c"></div>
  <div class="panel" id="d"><div class="letter">d</div><img src="panels/d.svg" alt="panel d"></div>
  <div class="panel" id="e"><div class="letter">e</div><img src="panels/e.svg" alt="panel e"></div>
  <div class="panel" id="f"><div class="letter">f</div><img src="panels/f.svg" alt="panel f"></div>
  <div class="panel" id="g"><div class="letter">g</div><img src="panels/g.svg" alt="panel g"></div>
  <div class="panel" id="h"><div class="letter">h</div><img src="panels/h.svg" alt="panel h"></div>

  <!-- Overflow report — read by build.py via Chrome's --dump-dom.
       Populated by the script below; build.py looks for any text inside. -->
  <div id="overflow-report" style="display: none;"></div>
  <script>
    (function checkOverflow() {
      const body = document.body;
      const bw = body.clientWidth;
      const bh = body.clientHeight;
      const issues = [];
      // 1) Page-level overflow
      if (body.scrollWidth > bw)  issues.push(`body overflow horizontally: ${body.scrollWidth - bw}px`);
      if (body.scrollHeight > bh) issues.push(`body overflow vertically: ${body.scrollHeight - bh}px`);
      // 2) Per-panel overflow (any panel whose bounding rect leaves the body)
      document.querySelectorAll('.panel').forEach(p => {
        const r = p.getBoundingClientRect();
        if (r.right  > bw + 0.5) issues.push(`#${p.id}: right edge overflows by ${(r.right  - bw ).toFixed(1)}px`);
        if (r.bottom > bh + 0.5) issues.push(`#${p.id}: bottom edge overflows by ${(r.bottom - bh).toFixed(1)}px`);
        if (r.left   < -0.5)     issues.push(`#${p.id}: left edge negative by ${(-r.left).toFixed(1)}px`);
        if (r.top    < -0.5)     issues.push(`#${p.id}: top edge negative by ${(-r.top).toFixed(1)}px`);
      });
      const rep = document.getElementById('overflow-report');
      rep.textContent = issues.length
        ? 'OVERFLOW_FOUND ' + issues.join(' | ')
        : 'OVERFLOW_OK';
      rep.style.display = 'block';
      rep.style.position = 'fixed';
      rep.style.left = '-9999px';   // off-screen, but DOM-readable
    })();
  </script>
</body>
</html>
